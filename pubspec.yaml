name: eas_client
description: Dart implementation of Microsoft Exchange ActiveSync (EAS) protocol client. Supports WBXML codec, email sync, push notifications, and more.
version: 0.1.0-alpha.1
repository: https://github.com/brlumen/eas_client
homepage: https://github.com/brlumen/eas_client
documentation: https://github.com/brlumen/eas_client#readme
issue_tracker: https://github.com/brlumen/eas_client/issues
topics:
  - activesync
  - exchange
  - email
  - wbxml
  - eas

environment:
  sdk: ^3.11.0

dependencies:
  http: ^1.3.0
  collection: ^1.19.0
  meta: ^1.16.0
  xml: ^6.5.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  mocktail: ^1.0.4
